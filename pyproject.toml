[tool.black]
line-length = 100
target-version = ["py312"]
include = '\.pyi?$'

[tool.ruff]
line-length = 100
target-version = "py312"

[tool.ruff.lint]
# Enable standard, non-opinionated checks:
# E/W: pycodestyle (PEP8 compliance)
# F: pyflakes (unused imports, variables, coding errors)
# I: isort (imports sort checker)
# UP: pyupgrade (python syntax upgrades)
# B: bugbear (common design bugs)
select = ["E", "F", "I", "UP", "B", "W"]
ignore = []

[tool.ruff.lint.isort]
known-first-party = ["app"]

[tool.isort]
profile = "black"
line_length = 100
multi_line_output = 3
include_trailing_comma = true
force_grid_wrap = 0
use_parentheses = true
known_first_party = ["app"]
